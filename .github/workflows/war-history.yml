name: WAR history (nflverse)
# One-off / occasional: rebuild historical WAR (2014+) from nflverse data,
# shaped to the league's exact scoring, pool and played rules, computed by the
# unchanged sleeper_war.py engine. Commits CSVs to nfl_history/.
on:
  workflow_dispatch:
    inputs:
      start:
        description: "First season"
        default: "2014"
      end:
        description: "Last season"
        default: "2025"
permissions:
  contents: write
concurrency:            # shared with data-refresh / values-refresh — see data-refresh.yml
  group: data-push
  cancel-in-progress: false
jobs:
  history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install nflreadpy
        run: pip install nflreadpy
      - name: Shape nflverse data to league form
        # inputs go through env, never interpolated straight into the shell —
        # a crafted dispatch input would otherwise be command injection
        env:
          START: ${{ github.event.inputs.start }}
          END: ${{ github.event.inputs.end }}
        run: python scripts/nfl_history.py --start "$START" --end "$END" --out nfl_history_data
      - name: Compute WAA/WAR (unchanged engine)
        run: python scripts/sleeper_war.py --data nfl_history_data --top 10
      - name: Collect outputs
        run: |
          mkdir -p nfl_history
          cp nfl_history_data/analysis/*.csv nfl_history/
          cp nfl_history_data/players_meta.csv nfl_history/
      - name: Commit history CSVs
        env:
          START: ${{ github.event.inputs.start }}
          END: ${{ github.event.inputs.end }}
        run: |
          git config user.name "big-dog-bot"
          git config user.email "actions@users.noreply.github.com"
          git add nfl_history
          git diff --cached --quiet && { echo "no history changes to commit"; exit 0; }
          git commit -m "WAR history rebuild ($START-$END)"
          # retry rebase+push so a concurrent push doesn't drop this run
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash && git push && exit 0
            echo "push attempt $i failed; retrying in $((i*10))s"; sleep $((i*10))
          done
          echo "push failed after 5 attempts"; exit 1