name: Build & deploy site
on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call:      # lets the data-refresh workflow trigger a deploy when it commits new data
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # Concurrency MUST live on the job, not the workflow: when this workflow is
    # invoked via workflow_call (data/values refresh), a workflow-level group is
    # ignored and the deploy inherits the caller's `data-push` group — so a
    # chained deploy and a push-triggered deploy could race and publish a stale
    # build over a fresh one. Job-level applies no matter how we're triggered.
    concurrency:
      group: pages-deploy
      cancel-in-progress: true   # rapid pushes: newest build wins, stale ones cancel
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Pick up any data commit that just landed
        run: git pull --ff-only
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Typecheck (vite build does NOT typecheck — this is the only gate)
        run: npm run typecheck
      - run: npm run build
      - name: Bundle league data into the site
        run: cp -r data dist/data
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
