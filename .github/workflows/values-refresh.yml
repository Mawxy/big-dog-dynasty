name: Market values refresh
on:
  schedule:
    - cron: "0 11 * * *"   # daily 11:00 UTC = 6/7 AM ET; touches NO Sleeper endpoints
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:            # shared with data-refresh / war-history — see data-refresh.yml
  group: data-push
  cancel-in-progress: false
jobs:
  values:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch market values (FantasyCalc + KeepTradeCut)
        run: python scripts/fetch_values.py --players data/players_min.json --out data/values.json
      - name: Bridge B (market value -> WAR, needs data/projections.json)
        run: python scripts/value_bridge.py
      - name: Commit updated values
        run: |
          git config user.name "big-dog-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/values.json data/values_history.json data/value_bridge.json
          git diff --cached --quiet || git commit -m "Market values $(date -u +%F)"
          git pull --rebase --autostash
          git push
  deploy:
    needs: values
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
