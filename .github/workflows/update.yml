name: Build, deploy & weekly data update
on:
  schedule:
    - cron: "0 6 * * 3"   # Wednesdays 06:00 UTC = 1:00 AM EST (2:00 AM EDT)
  workflow_dispatch:
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: site
  cancel-in-progress: false
jobs:
  refresh-data:
    # only the schedule / manual runs pull fresh data; code pushes just rebuild
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Pull league history from Sleeper
        run: python scripts/sleeper_pull.py 1312221243742621696 --players --out sleeper_data
      - name: Compute WAA/WAR
        run: python scripts/sleeper_war.py --data sleeper_data
      - name: Build site JSON
        run: python scripts/build_site_data.py --data sleeper_data --out data
      - name: Commit updated data
        run: |
          git config user.name "big-dog-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "Weekly data update $(date -u +%F)"
          git push
  build-deploy:
    needs: refresh-data
    if: always() && !cancelled() && (needs.refresh-data.result == 'success' || needs.refresh-data.result == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Pick up any data commit from this run
        run: git pull --ff-only
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
      - name: Bundle league data into the site
        run: cp -r data dist/data
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
