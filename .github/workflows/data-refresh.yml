name: Weekly data refresh
on:
  schedule:
    - cron: "0 6 * * 3"   # Wednesdays 06:00 UTC = 1:00 AM EST (2:00 AM EDT)
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
# every workflow that commits to main shares this group, so two data jobs can
# never race each other to push (a manual dispatch during a scheduled run used
# to fail on a rejected push).
concurrency:
  group: data-push
  cancel-in-progress: false
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Engine invariants (fail before touching Sleeper)
        run: python -m unittest discover -s tests
      - name: Pull league history from Sleeper
        run: python scripts/sleeper_pull.py 1312221243742621696 --players --out sleeper_data
      - name: Compute WAA/WAR
        run: python scripts/sleeper_war.py --data sleeper_data
      - name: Build site JSON
        run: python scripts/build_site_data.py --data sleeper_data --out data
      - name: Rebuild pick values (Bridge A; needs data/<season>/summary.json)
        run: python scripts/pick_value.py
      - name: Draft results per franchise (needs data/pick_values.json)
        run: python scripts/draft_analysis.py
      - name: Trade tracker
        run: python scripts/trade_analysis.py
      - name: Fetch Sleeper projections (composite input)
        id: fetch_proj
        run: python scripts/fetch_projections.py
        continue-on-error: true
      - name: Flag stale projections
        if: steps.fetch_proj.outcome == 'failure'
        run: |
          echo "::warning title=Stale projections::fetch_projections.py failed — \
          projections/composite this run are computed from the PREVIOUS inputs. \
          Trade values may be a week stale; investigate before relying on them."
      - name: Recompute WAR projections
        run: python scripts/project_war.py
      - name: Shard per-player projections for the site
        run: python scripts/shard_players.py --out data
      - name: Bridge B (market value -> WAR, refit on fresh projections)
        run: python scripts/value_bridge.py
      - name: DVI (ensemble trade value -> data/dvi.json)
        run: python scripts/blend_values.py
      - name: Validate built data before committing
        run: python scripts/validate_data.py
      - name: Commit updated data
        run: |
          git config user.name "big-dog-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data
          git diff --cached --quiet && { echo "no data changes to commit"; exit 0; }
          git commit -m "Weekly data update $(date -u +%F)"
          # retry rebase+push: a human/bot push in the window would otherwise
          # fail the run outright and drop this week's update
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash && git push && exit 0
            echo "push attempt $i failed; retrying in $((i*10))s"; sleep $((i*10))
          done
          echo "push failed after 5 attempts"; exit 1
  deploy:
    needs: refresh
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write